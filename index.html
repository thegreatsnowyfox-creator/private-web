<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Pop-Out Workspace v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen p-4 lg:p-6 space-y-6">

    <header class="glass max-w-5xl mx-auto rounded-2xl p-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-xl text-white">
                <i data-lucide="clock" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="font-bold tracking-tight text-sm">POP_OUT_WORKSPACE</h1>
                <p class="text-[11px] text-slate-500 dark:text-slate-400 font-mono" id="live-clock">Syncing...</p>
            </div>
        </div>
        <button onclick="toggleAppTheme()" class="p-2 rounded-xl bg-white/40 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800 text-amber-400"><i data-lucide="sun" class="w-4 h-4"></i></button>
    </header>

    <main class="max-w-5xl mx-auto space-y-6" id="workspace-main">
        
        <section id="widget-timer" class="glass p-6 rounded-2xl flex flex-col items-center justify-center text-center shadow-md relative group">
            <button onclick="popOutWidget('widget-timer', 'Focus Timer', 400, 300)" class="absolute top-4 right-4 p-2 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-400 hover:text-indigo-500 transition-colors opacity-0 group-hover:opacity-100" title="Pop out into floating window">
                <i data-lucide="external-link" class="w-4 h-4"></i>
            </button>
            <div class="p-3 bg-indigo-500/10 rounded-full text-indigo-500 mb-2">
                <i data-lucide="timer" class="w-8 h-8"></i>
            </div>
            <span class="text-[10px] text-slate-400 font-mono uppercase tracking-widest mb-1">Focus Session</span>
            <div class="flex items-center gap-3 mb-4">
                <h2 class="text-5xl font-mono font-bold tracking-tight" id="pomo-clock-digits">25:00</h2>
                <button onclick="modifyPomoSpan()" class="text-slate-400 hover:text-indigo-500 transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
            </div>
            <div class="flex gap-3 w-full max-w-sm">
                <button id="pomo-trigger-btn" onclick="togglePomoState()" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-mono text-xs rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-indigo-600/10"><i data-lucide="play" class="w-4 h-4"></i> START</button>
                <button onclick="resetPomoState()" class="p-3 bg-slate-200 dark:bg-slate-800 rounded-xl hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <section id="widget-todo" class="glass p-5 rounded-2xl flex flex-col gap-4 min-h-[400px] shadow-sm relative group">
                <button onclick="popOutWidget('widget-todo', 'Tasks', 450, 500)" class="absolute top-4 right-4 p-2 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-400 hover:text-indigo-500 transition-colors opacity-0 group-hover:opacity-100" title="Pop out into floating window">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                </button>
                <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-2">
                    <h2 class="font-bold text-xs tracking-wide uppercase font-mono flex items-center gap-2 text-slate-400">
                        <i data-lucide="check-square" class="text-emerald-500 w-4 h-4"></i> Tasks
                    </h2>
                    <span id="todo-count" class="text-[10px] bg-slate-200 dark:bg-slate-800 font-mono px-2 py-0.5 rounded-md mr-8">0 Open</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="todo-entry" placeholder="Add task item..." class="w-full text-xs px-3 py-2 bg-white/30 dark:bg-slate-900/30 border border-slate-200 dark:border-slate-800 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500">
                    <button onclick="commitTodoRow()" class="bg-indigo-600 text-white px-3 rounded-xl hover:bg-indigo-500 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>
                </div>
                <div id="todo-stack" class="space-y-2 overflow-y-auto max-h-[350px] hide-scrollbar flex-1"></div>
            </section>

            <section id="widget-notes" class="glass p-5 rounded-2xl flex flex-col gap-4 min-h-[400px] shadow-sm relative group">
                <button onclick="popOutWidget('widget-notes', 'Scratchpad', 450, 500)" class="absolute top-4 right-4 p-2 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-400 hover:text-indigo-500 transition-colors opacity-0 group-hover:opacity-100" title="Pop out into floating window">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                </button>
                <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-2">
                    <h2 class="font-bold text-xs tracking-wide uppercase font-mono flex items-center gap-2 text-slate-400">
                        <i data-lucide="sticky-note" class="text-amber-500 w-4 h-4"></i> Scratchpad
                    </h2>
                </div>
                <div class="flex flex-col gap-2">
                    <textarea id="note-entry" placeholder="Log quick thoughts..." class="w-full text-xs p-3 rounded-xl bg-white/30 dark:bg-slate-900/30 border border-slate-200 dark:border-slate-800 outline-none focus:ring-1 focus:ring-indigo-500 h-16 resize-none"></textarea>
                    <button onclick="commitNoteRow()" class="bg-indigo-600 text-white py-2 rounded-xl text-xs font-mono hover:bg-indigo-500 transition-colors">Save Note</button>
                </div>
                <div id="note-stack" class="space-y-3 overflow-y-auto max-h-[300px] hide-scrollbar flex-1"></div>
            </section>

        </div>
    </main>

    <script>
        let appState = {
            notes: [],
            todos: [],
            themeMode: "dark"
        };

        let pomoTimerReference = null;
        let pomoSessionDuration = 1500;
        let pomoRemainingSeconds = 1500;
        let runningPipWindows = {};

        function initializeWorkspace() {
            const vault = localStorage.getItem('minimal_focus_vault');
            if(vault) {
                try { appState = JSON.parse(vault); } catch(e) { console.error("Data fallback execution."); }
            }
            applySyncThemeState();
            syncRenderCanvas();
            
            setInterval(() => {
                document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
            }, 1000);
        }

        function saveWorkspaceState() {
            localStorage.setItem('minimal_focus_vault', JSON.stringify(appState));
            syncRenderCanvas();
        }

        function syncRenderCanvas() {
            renderTodoComponent();
            renderNoteComponent();
            
            // Loop through active pop-out windows to make sure they get updated elements
            Object.keys(runningPipWindows).forEach(id => {
                if (runningPipWindows[id] && runningPipWindows[id].document) {
                    // Re-initialize Lucide Icons in child windows
                    if (runningPipWindows[id].lucide) {
                        runningPipWindows[id].lucide.createIcons();
                    }
                }
            });
        }

        // FIXED DOCUMENT PICTURE-IN-PICTURE (SYNCED INTERACTIONS & STYLES)
        async function popOutWidget(widgetId, title, width, height) {
            if ('documentPictureInPicture' in window) {
                try {
                    const widgetElement = document.getElementById(widgetId);
                    const pipWindow = await window.documentPictureInPicture.requestWindow({
                        width: width,
                        height: height,
                    });

                    runningPipWindows[widgetId] = pipWindow;

                    // FIXED COLOR/BACKGROUND: Explicitly add dark configuration classes to pop-out context
                    pipWindow.document.documentElement.className = document.documentElement.className;
                    pipWindow.document.body.className = "bg-slate-950 text-slate-100 p-4 flex flex-col justify-stretch items-stretch h-full overflow-hidden";
                    pipWindow.document.title = title;

                    // Copy tailwind configurations and styles properly
                    Array.from(document.styleSheets).forEach((styleSheet) => {
                        try {
                            const newStyleEl = pipWindow.document.createElement('style');
                            if (styleSheet.cssRules) {
                                Array.from(styleSheet.cssRules).forEach((rule) => {
                                    newStyleEl.appendChild(pipWindow.document.createTextNode(rule.cssText));
                                });
                                pipWindow.document.head.appendChild(newStyleEl);
                            }
                        } catch (e) {
                            if (styleSheet.href) {
                                const link = pipWindow.document.createElement('link');
                                link.rel = 'stylesheet';
                                link.href = styleSheet.href;
                                pipWindow.document.head.appendChild(link);
                            }
                        }
                    });

                    // Move global icon libraries over to make functional icons work inside popout context
                    const script = pipWindow.document.createElement('script');
                    script.src = "https://unpkg.com/lucide@latest";
                    script.onload = () => { pipWindow.lucide = pipWindow.window.lucide; pipWindow.lucide.createIcons(); };
                    pipWindow.document.head.appendChild(script);

                    // Placeholder setup inside core layout container
                    const placeholder = document.createElement('div');
                    placeholder.id = `${widgetId}-placeholder`;
                    placeholder.className = "p-6 border border-dashed border-slate-800 text-center text-xs text-slate-500 rounded-2xl font-mono flex items-center justify-center min-h-[400px]";
                    placeholder.innerText = `[ ${title.toUpperCase()} FLOATING ]`;
                    
                    widgetElement.parentNode.insertBefore(placeholder, widgetElement);
                    pipWindow.document.body.appendChild(widgetElement);

                    // Hide original expand toggle icon when popped out
                    const popBtn = widgetElement.querySelector('button[onclick^="popOutWidget"]');
                    if (popBtn) popBtn.style.display = 'none';

                    // Re-bind click event scopes directly back to main tab windows execution loop
                    pipWindow.window.commitTodoRow = window.commitTodoRow;
                    pipWindow.window.toggleTodoCheck = window.toggleTodoCheck;
                    pipWindow.window.dropTodoItem = window.dropTodoItem;
                    pipWindow.window.commitNoteRow = window.commitNoteRow;
                    pipWindow.window.dropNoteItem = window.dropNoteItem;
                    pipWindow.window.togglePomoState = window.togglePomoState;
                    pipWindow.window.resetPomoState = window.resetPomoState;
                    pipWindow.window.modifyPomoSpan = window.modifyPomoSpan;

                    // Reattach element to master board when popped window closes
                    pipWindow.addEventListener("pagehide", (event) => {
                        delete runningPipWindows[widgetId];
                        const originalPlaceholder = document.getElementById(`${widgetId}-placeholder`);
                        if (originalPlaceholder) {
                            originalPlaceholder.parentNode.insertBefore(widgetElement, originalPlaceholder);
                            originalPlaceholder.remove();
                        }
                        if (popBtn) popBtn.style.display = '';
                        lucide.createIcons();
                    });

                } catch (error) {
                    alert("Pop-out block sequence registered.");
                    console.error(error);
                }
            } else {
                alert("Your browser does not support true desktop Document Picture-in-Picture window modifications.");
            }
        }

        // TO-DO PIPELINE METHODS
        function commitTodoRow() {
            // Read value dynamically across windows
            const inputEl = document.querySelector('#todo-entry') || (runningPipWindows['widget-todo'] && runningPipWindows['widget-todo'].document.querySelector('#todo-entry'));
            if(!inputEl || !inputEl.value.trim()) return;
            appState.todos.push({ id: Date.now(), task: inputEl.value.trim(), checked: false });
            inputEl.value = "";
            saveWorkspaceState();
        }

        function toggleTodoCheck(id) {
            const matchingItem = appState.todos.find(t => t.id === id);
            if(matchingItem) { matchingItem.checked = !matchingItem.checked; saveWorkspaceState(); }
        }

        function dropTodoItem(id) {
            appState.todos = appState.todos.filter(t => t.id !== id);
            saveWorkspaceState();
        }

        function renderTodoComponent() {
            const listElements = document.querySelectorAll('#todo-stack');
            const openCount = appState.todos.filter(t => !t.checked).length;
            
            document.querySelectorAll('#todo-count').forEach(el => el.innerText = `${openCount} Open`);

            listElements.forEach(list => {
                list.innerHTML = appState.todos.map(t => `
                    <div class="flex items-center justify-between p-2.5 bg-slate-900/60 rounded-xl border border-slate-800">
                        <div class="flex items-center gap-2 truncate flex-1">
                            <input type="checkbox" ${t.checked ? 'checked' : ''} onchange="window.toggleTodoCheck(${t.id})" class="rounded text-indigo-600 focus:ring-0 cursor-pointer h-3.5 w-3.5">
                            <span class="text-xs font-mono truncate tracking-tight ${t.checked ? 'line-through text-slate-500' : ''}">${t.task}</span>
                        </div>
                        <button onclick="window.dropTodoItem(${t.id})" class="text-slate-500 hover:text-red-400 pl-1 transition-colors"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                    </div>
                `).join('');
            });
            lucide.createIcons();
        }

        // NOTES ENGINE METHODS
        function commitNoteRow() {
            const textEl = document.querySelector('#note-entry') || (runningPipWindows['widget-notes'] && runningPipWindows['widget-notes'].document.querySelector('#note-entry'));
            if(!textEl || !textEl.value.trim()) return;
            appState.notes.unshift({ id: Date.now(), text: textEl.value.trim(), stamp: new Date().toLocaleTimeString() });
            textEl.value = "";
            saveWorkspaceState();
        }

        function dropNoteItem(id) {
            appState.notes = appState.notes.filter(n => n.id !== id);
            saveWorkspaceState();
        }

        function renderNoteComponent() {
            const listElements = document.querySelectorAll('#note-stack');
            
            listElements.forEach(list => {
                list.innerHTML = appState.notes.map(n => `
                    <div class="p-3 bg-slate-900/60 rounded-xl border border-slate-800 flex flex-col gap-1">
                        <p class="text-xs leading-relaxed break-words whitespace-pre-wrap">${n.text}</p>
                        <div class="flex items-center justify-between mt-1 pt-1 border-t border-slate-800/40">
                            <span class="text-[9px] font-mono text-slate-500">${n.stamp}</span>
                            <button onclick="window.dropNoteItem(${n.id})" class="text-slate-500 hover:text-red-400 transition-colors"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                `).join('');
            });
            lucide.createIcons();
        }

        // TIMER FUNCTIONS
        function modifyPomoSpan() {
            const targetMins = prompt("Specify focus session (minutes):", Math.floor(pomoSessionDuration / 60));
            if(targetMins && !isNaN(targetMins) && targetMins > 0) {
                pomoSessionDuration = Math.floor(targetMins) * 60;
                resetPomoState();
            }
        }

        function togglePomoState() {
            const triggerButtons = document.querySelectorAll('#pomo-trigger-btn');
            if(pomoTimerReference) {
                clearInterval(pomoTimerReference);
                pomoTimerReference = null;
                triggerButtons.forEach(btn => btn.innerHTML = '<i data-lucide="play" class="w-3.5 h-3.5"></i> RESUME');
            } else {
                pomoTimerReference = setInterval(() => {
                    if(pomoRemainingSeconds <= 0) {
                        clearInterval(pomoTimerReference);
                        pomoTimerReference = null;
                        triggerButtons.forEach(btn => btn.innerHTML = '<i data-lucide="play" class="w-3.5 h-3.5"></i> START');
                        alert("Session complete!");
                        pomoRemainingSeconds = pomoSessionDuration;
                    } else { pomoRemainingSeconds--; }
                    syncPomoDisplayDigits();
                }, 1000);
                triggerButtons.forEach(btn => btn.innerHTML = '<i data-lucide="pause" class="w-3.5 h-3.5"></i> PAUSE');
            }
            syncRenderCanvas();
        }

        function resetPomoState() {
            if(pomoTimerReference) { clearInterval(pomoTimerReference); pomoTimerReference = null; }
            pomoRemainingSeconds = pomoSessionDuration;
            document.querySelectorAll('#pomo-trigger-btn').forEach(btn => btn.innerHTML = '<i data-lucide="play" class="w-3.5 h-3.5"></i> START');
            syncPomoDisplayDigits();
            syncRenderCanvas();
        }

        function syncPomoDisplayDigits() {
            const m = Math.floor(pomoRemainingSeconds / 60);
            const s = pomoRemainingSeconds % 60;
            const computedString = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            // Sync digit values into main dashboard and popouts simultaneously
            const elements = document.querySelectorAll('#pomo-clock-digits');
            elements.forEach(el => el.innerText = computedString);
        }

        function toggleAppTheme() {
            appState.themeMode = appState.themeMode === 'dark' ? 'light' : 'dark';
            applySyncThemeState();
            localStorage.setItem('minimal_focus_vault', JSON.stringify(appState));
        }

        function applySyncThemeState() {
            if(appState.themeMode === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        }

        window.onload = () => { initializeWorkspace(); };
    </script>
</body>
</html>
