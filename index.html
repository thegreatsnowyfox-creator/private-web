<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStream Desktop Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: #333333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Full Screen Desktop Layout Split */
        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background-color: #f3f6fa;
        }

        /* Left Side Management Deck */
        .sidebar-deck {
            width: 320px;
            background: linear-gradient(135deg, #1d2030 0%, #0c0d14 100%);
            padding: 30px 20px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            z-index: 2;
            box-shadow: 5px 0 30px rgba(0,0,0,0.1);
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-icon {
            font-size: 20px;
            opacity: 0.8;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .header-icon:hover { opacity: 1; }

        .sidebar-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8fa0dd;
            margin: 20px 0 10px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-playlist-btn {
            background: transparent;
            border: none;
            color: #4d7cff;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        /* Playlist Navigation Items */
        .playlist-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .playlist-item:hover, .playlist-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .remove-p-btn {
            background: transparent;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .playlist-item:hover .remove-p-btn {
            opacity: 1;
        }

        /* Right Side Main Workstation Dashboard */
        .main-deck {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        /* Hero Player Top Card Bar */
        .hero-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(160, 175, 195, 0.15);
            border: 1px solid rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }

        .hero-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hero-icon-box {
            width: 65px;
            height: 65px;
            background: #a370f7;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(163, 112, 247, 0.2);
        }

        .hero-title {
            font-size: 22px;
            font-weight: 700;
            color: #1d2030;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            font-size: 13px;
            color: #7e8da2;
        }

        /* Timeline Slider element */
        .progress-block {
            flex: 1;
            max-width: 500px;
        }

        .progress-wrapper {
            width: 100%;
            background: #e4ebf5;
            height: 8px;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            background: #4d7cff;
            height: 100%;
            width: 0%;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(77, 124, 255, 0.5);
        }

        /* Centered Grid workspace area */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 160px));
            gap: 20px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: 20px;
        }

        .grid-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(160, 175, 195, 0.12);
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .grid-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(160, 175, 195, 0.2);
        }

        .grid-card.active {
            background: #eef4ff;
            border-color: #4d7cff;
        }

        .card-icon-frame {
            width: 70px;
            height: 70px;
            background: #f0f4f8;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #2c3a4e;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Trash track option button */
        .remove-track-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #9aa8bd;
            cursor: pointer;
            font-size: 14px;
            display: none;
        }

        .grid-card:hover .remove-track-btn {
            display: block;
        }

        .remove-track-btn:hover {
            color: #ff4d4d;
        }

        /* Controls Bar Layout */
        .hero-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ctrl-btn {
            background: #f0f4f8;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        .ctrl-btn:hover { background: #e4ebf5; }

        #play-trigger {
            background: #1d2030;
            color: white;
            width: 55px;
            height: 55px;
            font-size: 18px;
        }

        /* Creator Module Overlay Console */
        #admin-panel {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 13, 20, 0.96);
            z-index: 10;
            color: white;
            padding: 60px;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            box-shadow: 10px 0 40px rgba(0,0,0,0.5);
        }

        .admin-input {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        }

        .file-upload-label {
            background: #4d7cff;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            display: block;
            transition: background 0.2s;
        }
        .file-upload-label:hover { background: #3b66df; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div class="sidebar-deck">
            <div class="header-nav">
                <span style="font-weight: 700; font-size: 16px; letter-spacing: 1px; color: #4d7cff;">CLOUD_STREAM</span>
                <span class="header-icon" onclick="requestAdminAccess()">⚙️</span>
            </div>
            
            <div class="sidebar-section-title">
                <span>PLAYLISTS</span>
                <button class="add-playlist-btn" onclick="requestAdminAccess()">+ NEW</button>
            </div>

            <div class="playlist-container" id="playlist-mount">
                </div>
        </div>

        <div class="main-deck">
            
            <div class="hero-card">
                <div class="hero-info">
                    <div class="hero-icon-box" id="hero-art">🎵</div>
                    <div>
                        <div class="hero-title" id="current-title">Select Module Track</div>
                        <div class="hero-subtitle" id="current-artist">Ready for streaming audio deployment</div>
                    </div>
                </div>

                <div class="progress-block">
                    <div class="progress-wrapper" id="seek-timeline">
                        <div class="progress-fill" id="playback-progress"></div>
                    </div>
                </div>

                <div class="hero-controls">
                    <button class="ctrl-btn" id="prev-btn">⏮</button>
                    <button class="ctrl-btn" id="play-trigger">▶</button>
                    <button class="ctrl-btn" id="next-btn">⏭</button>
                </div>
            </div>

            <div class="items-grid" id="grid-mount">
                </div>
        </div>

        <div id="admin-panel">
            <h2 style="color: #4d7cff; letter-spacing: 1px;">CREATOR TERMINAL //</h2>
            <p style="font-size: 13px; color: #8f9db5; margin-bottom: 10px;">Authenticated Admin Management Access Console</p>
            
            <h3 style="font-size: 14px; color:#fff; margin-top:10px;">Option A: Choose File From Computer</h3>
            <label for="file-input" class="file-upload-label">📂 Select Audio File</label>
            <input type="file" id="file-input" accept="audio/*">
            <div id="file-name-preview" style="font-size: 12px; color: #00ff66; word-break: break-all;"></div>
            <button onclick="adminAddTrack()" style="background:#00ff66; color:black; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; width: 100%;">Deploy Local File</button>
            
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            
            <h3 style="font-size: 14px; color:#fff;">Option B: Create Blank Custom Playlist</h3>
            <input type="text" id="new-playlist-name" class="admin-input" placeholder="Playlist Name">
            <button onclick="adminAddPlaylist()" style="background:#ffffff; color:black; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">Generate Playlist</button>
            
            <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:transparent; color:#ff4d4d; margin-top:30px; border:none; cursor:pointer; text-align:left; font-weight:bold;">[X] SHUTDOWN CONSOLE</button>
        </div>

    </div>

    <script>
        // --- DATA STORE ---
        let playlists = [
            { id: "all", name: "All Tracks" },
            { id: "vibes", name: "Lo-Fi Chill Vibes" },
            { id: "study", name: "Deep Study Mode" }
        ];

        let masterTracks = [
            { id: 1, title: "Cyber Sunset", artist: "System Core", category: "vibes", icon: "🌅", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { id: 2, title: "Study Ambient", artist: "Lo-Fi Lab", category: "study", icon: "📝", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
        ];

        let activePlaylistId = 'all';
        let currentTrackIndex = 0;
        let isPlaying = false;
        let selectedFileBlobUrl = null;
        let selectedFileName = "";
        const audio = new Audio();

        const gridMount = document.getElementById('grid-mount');
        const playlistMount = document.getElementById('playlist-mount');
        const heroArt = document.getElementById('hero-art');
        const currentTitle = document.getElementById('current-title');
        const currentArtist = document.getElementById('current-artist');
        const playTrigger = document.getElementById('play-trigger');
        const playbackProgress = document.getElementById('playback-progress');
        const seekTimeline = document.getElementById('seek-timeline');
        const fileInput = document.getElementById('file-input');
        const fileNamePreview = document.getElementById('file-name-preview');

        function getFilteredTracks() {
            if (activePlaylistId === 'all') return masterTracks;
            return masterTracks.filter(t => t.category === activePlaylistId);
        }

        // --- RENDER INTERFACE ELEMENTS ---
        function renderSidebar() {
            playlistMount.innerHTML = '';
            playlists.forEach(p => {
                const item = document.createElement('div');
                item.classList.add('playlist-item');
                if (p.id === activePlaylistId) item.classList.add('active');
                
                let deleteButtonHTML = p.id !== 'all' ? `<button class="remove-p-btn" onclick="event.stopPropagation(); adminDeletePlaylist('${p.id}')">✕</button>` : '';
                item.innerHTML = `<span>📂 ${p.name}</span> ${deleteButtonHTML}`;
                
                item.addEventListener('click', () => switchPlaylist(p.id));
                playlistMount.appendChild(item);
            });
        }

        function renderTrackGrid() {
            gridMount.innerHTML = '';
            const list = getFilteredTracks();

            list.forEach((track, index) => {
                const globalIndex = masterTracks.indexOf(track);
                const card = document.createElement('div');
                card.classList.add('grid-card');
                if (globalIndex === currentTrackIndex) card.classList.add('active');

                card.innerHTML = `
                    <button class="remove-track-btn" onclick="event.stopPropagation(); adminDeleteTrack(${track.id})">🗑️</button>
                    <div class="card-icon-frame">${track.icon || '🎵'}</div>
                    <div class="card-title">${track.title}</div>
                    <div style="font-size:11px; color:#9aa8bd; margin-top:4px;">${track.artist}</div>
                `;
                card.addEventListener('click', () => selectTrack(globalIndex, true));
                gridMount.appendChild(card);
            });
        }

        function switchPlaylist(id) {
            activePlaylistId = id;
            renderSidebar();
            renderTrackGrid();
        }

        function selectTrack(index, autostart = false) {
            if (masterTracks.length === 0) {
                currentTitle.innerText = "No Tracks Loaded";
                currentArtist.innerText = "";
                heroArt.innerText = "🎵";
                return;
            }
            currentTrackIndex = (index + masterTracks.length) % masterTracks.length;
            const track = masterTracks[currentTrackIndex];

            audio.src = track.url;
            currentTitle.innerText = track.title;
            currentArtist.innerText = track.artist;
            heroArt.innerText = track.icon || '🎵';

            renderTrackGrid();

            if (autostart) {
                audio.play();
                isPlaying = true;
                playTrigger.innerText = "⏸";
            } else {
                audio.pause();
                isPlaying = false;
                playTrigger.innerText = "▶";
            }
        }

        function togglePlayback() {
            if (masterTracks.length === 0) return;
            if (isPlaying) {
                audio.pause();
                playTrigger.innerText = "▶";
            } else {
                audio.play();
                playTrigger.innerText = "⏸";
            }
            isPlaying = !isPlaying;
        }

        // --- PASSWORD CHECKS & ADMIN ARTIFACTS ---
        function requestAdminAccess() {
            const pass = prompt("ENTER SYSTEM CREATOR AUTHENTICATION PASSWORD:");
            if (pass === "void") {
                document.getElementById('admin-panel').style.display = 'flex';
            } else {
                alert("ACCESS FORBIDDEN.");
            }
        }

        // Catch the native operating system file select action
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFileBlobUrl = URL.createObjectURL(file);
                selectedFileName = file.name.replace(/\.[^/.]+$/, ""); // strip extension
                fileNamePreview.innerText = `Ready: ${file.name}`;
            }
        });

        function adminAddTrack() {
            if(selectedFileBlobUrl && selectedFileName) {
                masterTracks.push({
                    id: Date.now(),
                    title: selectedFileName,
                    artist: "Local Module",
                    category: activePlaylistId,
                    icon: "💾",
                    url: selectedFileBlobUrl
                });
                renderTrackGrid();
                
                // Reset inputs and close window
                document.getElementById('admin-panel').style.display = 'none';
                fileInput.value = '';
                fileNamePreview.innerText = '';
                selectedFileBlobUrl = null;
                selectedFileName = "";
            } else {
                alert("Please select a file first using the browse button.");
            }
        }

        function adminAddPlaylist() {
            const name = document.getElementById('new-playlist-name').value;
            if(name) {
                const newId = name.toLowerCase().replace(/\s+/g, '-');
                playlists.push({ id: newId, name: name });
                renderSidebar();
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('new-playlist-name').value = '';
                switchPlaylist(newId);
            }
        }

        function adminDeletePlaylist(id) {
            const pass = prompt("CONFIRM PLAYLIST DELETION PASSWORD:");
            if(pass === "void") {
                playlists = playlists.filter(p => p.id !== id);
                masterTracks.forEach(t => { if(t.category === id) t.category = 'all'; });
                if(activePlaylistId === id) activePlaylistId = 'all';
                renderSidebar();
                renderTrackGrid();
            } else { alert("INVALID SYSTEM PASS."); }
        }

        function adminDeleteTrack(trackId) {
            const pass = prompt("CONFIRM AUDIO PURGE PASSWORD:");
            if(pass === "void") {
                masterTracks = masterTracks.filter(t => t.id !== trackId);
                renderTrackGrid();
                if(masterTracks.length === 0) {
                    audio.pause();
                    isPlaying = false;
                    playTrigger.innerText = "▶";
                    selectTrack(0, false);
                } else {
                    selectTrack(0, isPlaying);
                }
            } else { alert("INVALID SYSTEM PASS."); }
        }

        // --- TIMELINE CONTROLS ---
        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / (audio.duration || 1)) * 100;
            playbackProgress.style.width = `${pct}%`;
        });

        seekTimeline.addEventListener('click', (e) => {
            if(audio.duration) {
                audio.currentTime = (e.offsetX / seekTimeline.clientWidth) * audio.duration;
            }
        });

        playTrigger.addEventListener('click', togglePlayback);
        document.getElementById('next-btn').addEventListener('click', () => { if(masterTracks.length) selectTrack((currentTrackIndex + 1) % masterTracks.length, isPlaying); });
        document.getElementById('prev-btn').addEventListener('click', () => { if(masterTracks.length) selectTrack((currentTrackIndex - 1 + masterTracks.length) % masterTracks.length, isPlaying); });
        audio.addEventListener('ended', () => { document.getElementById('next-btn').click(); });

        // --- CORE INITIATION ---
        renderSidebar();
        renderTrackGrid();
        selectTrack(0, false);
    </script>
</body>
</html>
